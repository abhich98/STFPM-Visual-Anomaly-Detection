seed: 0
device: cuda

dataset:
  name: mvtec
  root: mvtec_anomaly_detection
  category: transistor # also change the path below for the best checkpoint path
  image_size: 256
  num_workers: 0
  pin_memory: false
  extensions: [png, jpg, jpeg]

model:
  name: resnet18
  teacher_pretrained: true
  student_pretrained: false
  feature_layers: ['4', '5', '6'] #[layer1, layer2, layer3]

train:
  epochs: 40
  batch_size: 64
  val_split: 0.2
  lr: 0.4
  momentum: 0.9
  weight_decay: 1.0e-4
  checkpoint_dir: snapshots

eval:
  batch_size: 32
  n_jobs: 10 # joblib parallelization for PRO score calculation
  pro_max_step: 4000
  checkpoint_path: snapshots/transistor/best.pth.tar
  calibration:
    enabled: false
    target_fpr: 0.01
    output_path: artifacts/calibration.json

onnx:
  output_path: artifacts/stfpm.onnx
  dynamo: true
  opset: 20

validation:
  # Number of test images to validate (null = all images in the test split)
  max_images: null
  # Batch size for both PyTorch and ONNX inference during validation
  batch_size: 32
  # Max acceptable absolute error between PyTorch and ONNX outputs
  tolerance: 1.0e-5
  # Optional path to save validation results as JSON (null = don't save)
  output_json: null
